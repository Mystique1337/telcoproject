services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: npa-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - ollama
      - chroma
    volumes:
      - ./data:/app/data:ro
    networks:
      - npa-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: npa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - npa-net
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: npa-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - npa-net
    restart: unless-stopped

volumes:
  ollama-data:
  chroma-data:

networks:
  npa-net:
    driver: bridge
