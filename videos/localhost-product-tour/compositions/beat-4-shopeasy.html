  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      var BEAT = 12.0;
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // Parallax pan: card column x 40→0 over 12s
      tl.fromTo("#b4-cards", { x: 40 }, { x: 0, duration: 12.0, ease: "none" }, 0.0);

      // Eyebrow
      tl.fromTo("#b4-eyebrow", { opacity: 0, filter: "blur(6px)" }, { opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power2.out" }, 0.0);

      // Cards slide in from right, staggered
      tl.fromTo("#b4-card0", { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 0.4);
      tl.fromTo("#b4-card1", { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 0.55);
      tl.fromTo("#b4-card2", { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 0.70);

      // Context badge appears at t=3.5s
      tl.fromTo("#b4-badge", { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1.0, duration: 0.35, ease: "back.out(1.4)" }, 3.5);

      // Cards re-rank at t=3.8s: card0 goes to bottom (y+=160), card2 goes to top (y-=160)
      tl.to("#b4-card0", { y: 228, duration: 0.6, ease: "power3.inOut" }, 3.8);
      tl.to("#b4-card2", { y: -228, duration: 0.6, ease: "power3.inOut" }, 3.8);

      // Update rank numbers and names mid-animation
      tl.call(function() {
        var r0 = document.getElementById("b4-r0");
        var r2 = document.getElementById("b4-r2");
        var n0 = document.getElementById("b4-n0");
        var n2 = document.getElementById("b4-n2");
        var t0 = document.getElementById("b4-t0");
        var t2 = document.getElementById("b4-t2");
        if (r0) r0.textContent = "#3";
        if (r2) r2.textContent = "#1";
        if (n0) n0.textContent = "MTN Airtime Bundle";
        if (n2) n2.textContent = "Ankara Print Fabric";
        if (t0) t0.textContent = "Telecom";
        if (t2) t2.textContent = "Fashion";
      }, null, 4.1);

      // NDCG panel fades in at t=7.6s — VO "NDCG at 10" at internal ~7.96s (0.36s visual lead)
      tl.fromTo("#b4-ndcg", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 7.6);

      // NDCG counter 0.000 → 0.572 over 2.0s; finishes at t=9.6s, VO "0.572" at internal ~9.70s
      var ndcgEl = document.getElementById("b4-ndcg-num");
      var ndcgObj = { val: 0.0 };
      tl.to(ndcgObj, {
        val: 0.572,
        duration: 2.0,
        ease: "power2.out",
        onUpdate: function() {
          if (ndcgEl) ndcgEl.textContent = ndcgObj.val.toFixed(3);
        }
      }, 7.6);

      // "Best of 5 models" appears at t=11.5s — VO "best of five models tested" at internal ~11.72s
      tl.fromTo("#b4-ndcg-sub", { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1.0, duration: 0.4, ease: "power2.out" }, 11.5);

      // Subtle card breathe after re-ranking settles
      tl.to("#b4-card0", { scaleX: 1.005, duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.0);
      tl.to("#b4-card1", { scaleX: 1.005, duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.3);
      tl.to("#b4-card2", { scaleX: 1.005, duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.6);

      window.__timelines["beat-4-shopeasy"] = tl;
    })();
  </script>
