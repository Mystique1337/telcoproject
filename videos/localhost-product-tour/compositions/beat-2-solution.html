  <div
    id="beat-2-solution"
    data-composition-id="beat-2-solution"
    data-width="1920"
    data-height="1080"
    style="width:1920px; height:1080px; position:relative; overflow:hidden; background:#060912;"
  >

    <!-- Camera dolly wrapper -->
    <div class="camera-wrap" id="b2-camera">

      <!-- Green divider line -->
      <div class="green-line" id="b2-line"></div>

      <!-- "Built for" label -->
      <div class="built-for" id="b2-built-for">Built for</div>

      <!-- NIGERIA. per-letter -->
      <div class="nigeria-wrap" id="b2-nigeria-wrap">
        <span class="letter" id="b2-l0">N</span>
        <span class="letter" id="b2-l1">I</span>
        <span class="letter" id="b2-l2">G</span>
        <span class="letter" id="b2-l3">E</span>
        <span class="letter" id="b2-l4">R</span>
        <span class="letter" id="b2-l5">I</span>
        <span class="letter" id="b2-l6">A</span>
        <span class="letter" id="b2-l7">.</span>
      </div>

      <!-- "Not adapted." typing target -->
      <div class="not-adapted" id="b2-not-adapted"></div>

      <!-- NaijaReviewer-8B credential hero block -->
      <div class="credential">
        <div class="credential-name" id="b2-cred-name">NaijaReviewer-8B</div>
        <div class="credential-sub" id="b2-cred-sub">Fine-tuned on 4.2M Nigerian interactions</div>
      </div>

      <!-- CPU icon (captured SVG, tinted violet via filter) -->
      <div class="cpu-icon" id="b2-cpu">
        <img src="capture/assets/svgs/lucide-cpu.svg" width="80" height="80"
             style="filter: invert(44%) sepia(80%) saturate(500%) hue-rotate(250deg) brightness(1.1); display:block;">
      </div>

    </div><!-- /.camera-wrap -->

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      var BEAT = 7.5;

      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var TYPING_TEXT = "Not adapted.";
      var TYPING_CHARS = TYPING_TEXT.length; // 12

      /* ─── 0.0s: green line draws scaleX 0 → 1 ─────────────────── */
      tl.fromTo(
        "#b2-line",
        { scaleX: 0 },
        { scaleX: 1, duration: 0.5, ease: "expo.out" },
        0.0
      );

      /* ─── 0.5s: "Built for" fades up ───────────────────────────── */
      tl.fromTo(
        "#b2-built-for",
        { opacity: 0, y: 10 },
        { opacity: 0.7, y: 0, duration: 0.4, ease: "power2.out" },
        0.5
      );

      /* ─── 0.8s: NIGERIA. letters drop in with stagger ──────────── */
      var letters = ["#b2-l0","#b2-l1","#b2-l2","#b2-l3","#b2-l4","#b2-l5","#b2-l6","#b2-l7"];
      letters.forEach(function (sel, i) {
        tl.fromTo(
          sel,
          { opacity: 0, y: -60, rotation: -8 },
          { opacity: 1, y: 0, rotation: 0, duration: 0.45, ease: "back.out(1.7)" },
          0.8 + i * 0.04
        );
      });

      /* ─── 1.4s: camera push 1.0 → 1.04 ────────────────────────── */
      tl.fromTo(
        "#b2-camera",
        { scale: 1.0 },
        { scale: 1.04, duration: 0.35, ease: "power3.out" },
        1.4
      );

      /* ─── 1.75s: slow dolly continues 1.04 → 1.07 over remaining beat.
             Starts at 1.75 (after the push ends) to avoid overlap.     */
      tl.to(
        "#b2-camera",
        { scale: 1.07, duration: BEAT - 1.75, ease: "none", overwrite: "auto" },
        1.75
      );

      /* ─── 1.8s: "Not adapted." container fades in, chars type on ── */
      var notAdaptedEl = document.getElementById("b2-not-adapted");
      tl.fromTo(
        "#b2-not-adapted",
        { opacity: 0 },
        { opacity: 1, duration: 0.01 },
        1.8
      );
      var CHAR_DELAY = 0.035;
      for (var c = 0; c <= TYPING_CHARS; c++) {
        (function (ci) {
          tl.call(
            function () {
              if (notAdaptedEl) {
                notAdaptedEl.textContent = TYPING_TEXT.substring(0, ci);
              }
            },
            null,
            1.8 + ci * CHAR_DELAY
          );
        })(c);
      }

      /* ─── 2.6s: NaijaReviewer-8B resolves from blur — product name hero reveal */
      tl.fromTo(
        "#b2-cred-name",
        { opacity: 0, filter: "blur(20px)", scale: 0.97 },
        { opacity: 1, filter: "blur(0px)", scale: 1.0, duration: 0.7, ease: "power2.out" },
        2.6
      );

      /* ─── 3.2s: subtitle fades up below */
      tl.fromTo(
        "#b2-cred-sub",
        { opacity: 0, y: 12 },
        { opacity: 0.65, y: 0, duration: 0.5, ease: "power2.out" },
        3.2
      );

      /* ─── 3.0s: CPU icon fades in ───────────────────────────────── */
      tl.fromTo(
        "#b2-cpu",
        { opacity: 0 },
        { opacity: 0.65, duration: 0.6, ease: "power2.out" },
        3.0
      );

      /* ─── 3.6s: CPU float oscillation y ±4px, 2.2s, yoyo, repeat:2
             repeat:2 = 3 half-cycles = 6.6s total — runs to ~10.2s beat-local,
             which beyond the beat duration is fine (clip stops at 7.5s).     */
      tl.fromTo(
        "#b2-cpu",
        { y: 0 },
        { y: -4, duration: 2.2, ease: "sine.inOut", yoyo: true, repeat: 2 },
        3.6
      );

      /* ─── 3.5s: green line pulse opacity 0.85 → 1.0, 1.8s, yoyo, repeat:1 */
      tl.fromTo(
        "#b2-line",
        { opacity: 0.85 },
        { opacity: 1.0, duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: 1 },
        3.5
      );

      /* ─── register ──────────────────────────────────────────────── */
      window.__timelines["beat-2-solution"] = tl;
    })();
  </script>
