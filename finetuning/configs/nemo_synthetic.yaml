# NeMo Data Designer — Synthetic Persona-Conditioned Review Generation
#
# Drives `scripts/build_finetune_corpus.py` Source 3 (synthetic 2k).
# Each row in the output is one (persona × product × register × rating → review) example
# generated by an NVIDIA-hosted Nemotron/Llama model via the OpenAI-compatible NIM endpoint.

# ---- model ----
# The actual model is selected at runtime from the NVIDIA_NEMO_MODEL env var
# (see app/config.py). This `model` key is only a fallback used when the env
# var is unset. Default to a widely-available NIM model.
provider: nvidia
model: meta/llama-3.3-70b-instruct
temperature: 0.85
max_tokens: 450
top_p: 0.95

# ---- generation volume ----
target_examples: 2000
parallel_workers: 8        # concurrent NIM calls

# ---- schema ----
# Each generated example combines one persona archetype, one product from the
# Jumia catalog (Idowenst/jumia_dataset), one register tier, and a stratified rating.
persona_pool:
  - chinwe_owerri      # Owerri Gen-Z, code-mixed Igbo+English, communal-hedonic
  - tunde_lagos        # Lagos market trader, Pidgin-heavy, utilitarian
  - aisha_kano         # Kano teacher, measured Nigerian English, Muslim framing
  - femi_abuja         # Abuja banker, standard Nigerian English, low-intensity
  - ifeoma_ph          # Port Harcourt Nollywood superfan, Nigerian English

# Register tiers — stratified so code_mixed is over-sampled (under-represented in the
# real-voice Jumia data, so synthetic backfills here).
register_distribution:
  standard_english: 0.10
  nigerian_english: 0.30
  nigerian_pidgin:  0.25
  code_mixed:       0.35      # boosted

# Rating distribution — stratified for balance across stars (1-5).
# The Aymane Jumia source skews positive; synthetic balances 1-2 stars more.
rating_distribution:
  1: 0.15
  2: 0.20
  3: 0.20
  4: 0.20
  5: 0.25

# Product source — sample uniformly from the Jumia catalog already in our index.
product_source:
  type: huggingface_dataset
  dataset_id: Idowenst/jumia_dataset
  split: train
  sample_n: 2000
  fields:
    title: name
    category: category
    description: description
    price: price

# ---- quality filters (applied post-generation) ----
filters:
  min_chars: 50
  max_chars: 500
  reject_if_contains: ["[INST]", "</s>", "I cannot", "As an AI", "I'm an AI"]
  require_first_person_or_nigerian_marker: true

# ---- output ----
output_path: data/finetune/synthetic_v1.jsonl
declared_synthetic: true

# ---- prompt template (single-shot, schema-grounded) ----
# Inline so the YAML is the single source of truth for what gets generated.
prompt_template: |
  You are simulating a Nigerian customer writing a product review on Jumia.

  USER PERSONA: {persona_name}
  - Register tier: {register_tier}
  - Voice characteristics: {persona_voice}
  - Aspects this user emphasises: {persona_aspects}
  - Intensity calibration: this user uses the register markers naturally,
    not in a stereotyped way.

  PRODUCT (from Jumia catalog):
  - Title: {product_title}
  - Category: {product_category}
  - Description: {product_description}
  - Price: ₦{product_price}

  TARGET RATING: {rating}/5

  CONSTRAINTS:
  - 2 to 5 sentences. No emojis unless the persona's register specifically uses them.
  - The text must justify the {rating}/5 rating without explicitly saying the number.
  - Register MUST match: {register_instructions}
  - Mention at least one of the user's aspect priorities naturally.
  - Do NOT use AI-flavored phrases ("As an AI", "I cannot", "I'm an AI assistant").
  - Do NOT add disclaimers, ratings labels, or meta-commentary.
  - Output ONLY the review text. No quotes, no preamble, no formatting.

  REVIEW:

# Register-specific instruction blocks injected into `{register_instructions}`.
register_instructions:
  standard_english: |
    Use clear standard English. No Pidgin, no Yoruba/Hausa/Igbo, no Nigerian slang.
  nigerian_english: |
    Use Nigerian English with natural markers ("well done sir/ma", "no shaking",
    "sharp sharp", sentence-final "now", "sef"). Avoid heavy Pidgin.
  nigerian_pidgin: |
    Use Nigerian Pidgin naturally ("abeg", "no cap", "wahala", "e shock me",
    "scatter", "dey", "go", "be like say"). Sound authentic, not stereotyped.
  code_mixed: |
    Code-mix Nigerian English with natural Yoruba/Hausa/Igbo insertions
    ("ahn ahn", "haba", "wallahi", "nna", "biko", "owambe", "wahala").
    Do NOT translate or explain. Mix the way real Nigerians do in chat or social media.
