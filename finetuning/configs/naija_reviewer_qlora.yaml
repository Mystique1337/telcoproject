# NaijaReviewer-8B — QLoRA training config.
# See finetuning/README.md for full context.

# ---- model ----
base_model: meta-llama/Meta-Llama-3.1-8B-Instruct
trust_remote_code: false

# ---- quantisation (QLoRA) ----
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true

# ---- LoRA ----
lora_r: 16
lora_alpha: 32
lora_dropout: 0.1
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ---- data ----
train_file: data/finetune/v1.jsonl
val_split: 0.05
max_seq_length: 4096
data_format: instruction  # uses TRL SFTTrainer-compatible prompt template

# ---- training ----
output_dir: finetuning/checkpoints/naija-reviewer-v1
num_train_epochs: 2
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 0.0002
lr_scheduler_type: cosine
warmup_steps: 100
weight_decay: 0.01
logging_steps: 25
save_strategy: epoch
evaluation_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
bf16: true
gradient_checkpointing: true
optim: paged_adamw_8bit
seed: 42

# ---- logging / experiment tracking ----
report_to: ["wandb"]
run_name: naija-reviewer-8b-v1
wandb_project: naija-persona-agent

# ---- early stopping ----
early_stopping_patience: 1
